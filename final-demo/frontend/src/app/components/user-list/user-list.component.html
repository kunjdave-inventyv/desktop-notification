
<div class="user-list-panel">
  <div class="panel-header">
    <span class="panel-title">People</span>
    <span class="count">{{ (state.users$ | async)?.length ?? 0 }}</span>
  </div>

  <div class="user-list">
    <ng-container *ngIf="(state.users$ | async) as users">
      <div *ngIf="users.length === 0" class="empty-state">
        No other users yet
      </div>

      <div
        *ngFor="let user of users; trackBy: trackUser"
        class="user-item"
        [class.offline]="!user.is_online"
      >
        <div class="avatar">{{ user.user_id[0].toUpperCase() }}</div>
        <div class="user-info">
          <span class="user-name">{{ user.user_id }}</span>
          <span class="status-dot" [class.online]="user.is_online">
            {{ user.is_online ? 'online' : 'offline' }}
          </span>
        </div>
        <div class="actions">
          <button
            class="btn-call"
            (click)="call(user.user_id, false)"
            [disabled]="!callIdle"
            title="Audio call {{ user.user_id }}"
          >
            ☎
          </button>
          <button
            class="btn-call video"
            (click)="call(user.user_id, true)"
            [disabled]="!callIdle"
            title="Video call {{ user.user_id }}"
          >
            📹
          </button>
        </div>
      </div>
    </ng-container>
  </div>
</div>
